name: Deploy Demo (Cloudflare Pages)

# Builds the frontend in DEMO mode (mocked APIs, no backend) and deploys it to
# a separate Cloudflare Pages project.
#
# Required GitHub repository configuration (Settings -> Secrets and variables
# -> Actions):
#   Secrets (under the same environment as the regular frontend deploy)
#     CLOUDFLARE_API_TOKEN
#     CLOUDFLARE_ACCOUNT_ID
#   Variables
#     CLOUDFLARE_PAGES_PROJECT_DEMO - the Pages project to deploy the demo to
#                                     (separate from CLOUDFLARE_PAGES_PROJECT)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-demo.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (demo mode)
        env:
          VITE_DEMO_MODE: "true"
          # VITE_API_URL is unused in demo mode (mock layer intercepts all
          # calls), but kept blank to make that explicit.
          VITE_API_URL: ""
        run: npm run build

      - name: Deploy to Cloudflare Pages (demo project)
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: >-
            pages deploy dist
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_DEMO }}
            --branch=main
