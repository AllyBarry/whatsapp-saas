name: Deploy Frontend (Cloudflare Pages)

# Builds the React SPA and deploys the static output to Cloudflare Pages.
#
# Required GitHub repository configuration:
#   Secrets   (Settings → Secrets and variables → Actions → Secrets)
#     CLOUDFLARE_API_TOKEN   - token with the "Cloudflare Pages: Edit" permission
#     CLOUDFLARE_ACCOUNT_ID  - your Cloudflare account id
#   Variables (Settings → Secrets and variables → Actions → Variables)
#     CLOUDFLARE_PAGES_PROJECT - the Cloudflare Pages project name
#     VITE_API_URL             - backend API base URL (e.g. https://api.yourdomain.com)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Secrets/variables live under the "prod" GitHub Environment; the job must
    # opt into that environment for them to be available.
    environment: prod
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: >-
            pages deploy dist
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }}
            --branch=main
